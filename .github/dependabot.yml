version: 2
updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - dependencies
    groups:
      github-actions-updates:
        patterns: ['*']
    cooldown:
      default-days: 7

  - package-ecosystem: composer
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    versioning-strategy: increase
    commit-message:
      prefix: 'fix'
      include: 'scope'
    labels:
      - dependencies
    groups:
      composer-dev-minor-patch:
        dependency-type: 'development'
        update-types: [minor, patch]
      # We don't bundle minor or major production assets, so they're tested individually.
      composer-patch:
        dependency-type: 'production'
        update-types: [patch]

  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    versioning-strategy: increase
    commit-message:
      prefix: 'fix'
      include: 'scope'
    labels:
      - dependencies
    groups:
      npm-dev-minor-patch:
        dependency-type: 'development'
        update-types: [minor, patch]
      npm-prod-minor-patch:
        dependency-type: 'production'
        update-types: [minor, patch]
